<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access: Birthday.exe</title>
    <style>
        body {
            background-color: #008080; /* Classic old Windows Teal background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Tahoma", sans-serif;
        }
        /* This makes it look like a JOptionPane window */
        #dialog-box {
            background: #d4d0c8;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            width: 400px;
            padding: 2px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: black;
        }
        input {
            width: 90%;
            border-bottom: 2px solid #fff;
            border-right: 2px solid #fff;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            padding: 4px;
            outline: none;
        }
        button {
            width: 75px;
            background: #d4d0c8;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
        }
        #photo-container img {
            width: 150px;
            border: 1px solid #808080;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="dialog-box">
        <div class="title-bar">
            <span id="window-title">Identity Verification</span>
            <span style="font-size: 10px;">X</span>
        </div>
        <div class="content">
            <p id="message" style="text-align: center;">Please enter your full name:</p>
            <input type="text" id="userInput">
            <div id="photo-container"></div>
            <button onclick="handleInput()">OK</button>
        </div>
    </div>

    <script src="birthdaygift.js"></script>
</body>
</html>
